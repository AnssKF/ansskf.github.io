<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Anss Khaled Farouk — Senior Software Engineer specialising in Ruby on Rails, ReactJS, and full-stack web development. Portfolio and contact." />
  <meta name="robots" content="index, follow" />
  <meta name="color-scheme" content="dark" />
  <title>Anss Khaled — Senior Software Engineer</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://anssk.me" />

  <!-- Sitemap discovery -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

  <!-- Open Graph -->
  <meta property="og:type"        content="profile" />
  <meta property="og:title"       content="Anss Khaled — Senior Software Engineer" />
  <meta property="og:description" content="Senior Software Engineer specialising in Ruby on Rails, ReactJS, and full-stack web development." />
  <meta property="og:url"         content="https://anssk.me" />
  <meta property="og:locale"      content="en_US" />
  <meta property="profile:first_name" content="Anss" />
  <meta property="profile:last_name"  content="Khaled" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Anss Khaled — Senior Software Engineer" />
  <meta name="twitter:description" content="Senior Software Engineer specialising in Ruby on Rails, ReactJS, and full-stack web development." />

  <!-- Structured Data: Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Anss Khaled Farouk",
    "alternateName": "Anss Khaled",
    "url": "https://anssk.me",
    "email": "anss.khaled00@gmail.com",
    "telephone": "+20 1016329993",
    "jobTitle": "Senior Software Engineer",
    "description": "Software Engineer with expertise in building robust and scalable front-end and back-end systems.",
    "sameAs": [
      "https://www.linkedin.com/in/ansskfarouk/",
      "https://github.com/AnssKF"
    ],
    "knowsAbout": [
      "Ruby on Rails",
      "ReactJS",
      "PostgreSQL",
      "PHP Laravel",
      "Full-Stack Web Development",
      "Microservices Architecture",
      "Docker"
    ],
    "worksFor": {
      "@type": "Organization",
      "name": "Pixelogic Media"
    },
    "hasOccupation": {
      "@type": "Occupation",
      "name": "Senior Software Engineer",
      "occupationLocation": {
        "@type": "Country",
        "name": "Egypt"
      },
      "skills": "Ruby on Rails, ReactJS, PostgreSQL, Docker"
    }
  }
  </script>

  <!-- Google Fonts: Space Grotesk (display/body) + Space Mono (technical) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
  />

  <!-- css.gg icon library (pure CSS, ~700 icons) -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="stylesheet" href="https://unpkg.com/css.gg@2.0.0/icons/all.css" />

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />

  <!-- Theme: applied before render to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('portfolio-theme') || 'system';
      if (t === 'system') {
        t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <!-- Site styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body x-data="portfolio()">

  <!-- ── Loader Overlay ──────────────────────────────────── -->
  <div
    class="loader-overlay"
    :class="{ 'is-hidden': !loading }"
    aria-hidden="true"
    role="presentation"
  >
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
  </div>

  <!-- ── Views Container ─────────────────────────────────── -->
  <main class="content-area" aria-live="polite" aria-atomic="false">

    <!-- ── View 1: Landing ─────────────────────────────── -->
    <section
      class="view"
      :class="{
        'is-active':  currentView  === 'landing',
        'is-exiting': exitingView  === 'landing'
      }"
      aria-label="Home"
    >
      <div class="view-landing">

        <!-- Top metadata bar -->
        <div class="landing-header">
          <span class="mono-label" x-text="'AK — ' + (resume?.basics?.label ?? '')"></span>
          <span class="mono-label" x-text="resume?.basics?.location?.city ?? ''"></span>
        </div>

        <!-- Hairline separator -->
        <span class="landing-sep" aria-hidden="true"></span>

        <!-- Centred name block + spec annotation -->
        <div class="landing-name-block">
          <div class="landing-name" aria-label="Full name">
            <span class="name--first" x-text="firstName"></span>
            <span class="name--last"  x-text="lastName"></span>
          </div>
          <aside class="landing-spec" aria-hidden="true">
            <span class="spec-item spec-item--rule"></span>
            <span class="spec-item">Company</span>
            <span class="spec-item spec-item--value" x-text="(resume?.work ?? [])[0]?.name ?? '—'"></span>
            <span class="spec-item spec-item--rule"></span>
            <span class="spec-item">Role</span>
            <span class="spec-item spec-item--value" x-text="(resume?.work ?? [])[0]?.position ?? '—'"></span>
            <span class="spec-item spec-item--rule"></span>
            <span class="spec-item">Since</span>
            <span class="spec-item spec-item--value" x-text="formatDate((resume?.work ?? [])[0]?.startDate) || '—'"></span>
          </aside>
        </div>

        <!-- Footer: links -->
        <footer class="landing-footer">
          <hr class="landing-rule" aria-hidden="true" />
          <div class="landing-links">
            <!-- Email -->
            <a
              class="landing-link"
              :href="'mailto:' + (resume?.basics?.email ?? '')"
              x-show="resume?.basics?.email"
              @mouseenter="showLinkPopup($event, 'mailto:' + (resume?.basics?.email ?? ''))"
              @mouseleave="hideLinkPopup()"
              @contextmenu.prevent="showLinkPopup($event, 'mailto:' + (resume?.basics?.email ?? ''))"
            >
              <span class="icon-box"><i class="gg-mail" aria-hidden="true"></i></span>
              <span x-text="resume?.basics?.email"></span>
            </a>

            <!-- Social profiles from JSON -->
            <template
              x-for="profile in (resume?.basics?.profiles ?? [])"
              :key="profile.network"
            >
              <a
                class="landing-link"
                :href="profile.url"
                target="_blank"
                rel="noopener noreferrer"
                @mouseenter="showLinkPopup($event, profile.url)"
                @mouseleave="hideLinkPopup()"
                @contextmenu.prevent="showLinkPopup($event, profile.url)"
              >
                <span class="icon-box"><i :class="'gg-' + profileIcon(profile.network)" aria-hidden="true"></i></span>
                <span x-text="profile.network + ' / ' + profile.username"></span>
              </a>
            </template>

            <!-- Resume / CV -->
            <a
              class="landing-link"
              href="https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view"
              target="_blank"
              rel="noopener noreferrer"
              @mouseenter="showLinkPopup($event, 'https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view')"
              @mouseleave="hideLinkPopup()"
              @contextmenu.prevent="showLinkPopup($event, 'https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view')"
            >
              <span class="icon-box"><i class="gg-file-document" aria-hidden="true"></i></span>
              <span>Resume / CV</span>
            </a>
          </div>
        </footer>

      </div>
    </section>

    <!-- ── View 2: Education ────────────────────────────── -->
    <section
      class="view"
      :class="{
        'is-active':  currentView  === 'education',
        'is-exiting': exitingView  === 'education'
      }"
      aria-label="Education"
    >
      <div class="view-inner">
        <h2 class="section-label" :data-index="views.find(v => v.id === 'education')?.sectionIndex">Education</h2>

        <div x-show="!(resume?.education?.length)" class="empty-state">
          No education entries found.
        </div>

        <template
          x-for="(edu, i) in (resume?.education ?? [])"
          :key="i"
        >
          <article class="card">
            <div class="card-row">
              <h3 class="card-title">
                <template x-if="edu.url">
                  <a
                    class="card-link"
                    :href="edu.url"
                    target="_blank"
                    rel="noopener noreferrer"
                    x-text="edu.institution"
                  ></a>
                </template>
                <template x-if="!edu.url">
                  <span x-text="edu.institution"></span>
                </template>
              </h3>
              <span
                class="card-meta"
                x-show="edu.startDate || edu.endDate"
              >
                <span x-text="formatDate(edu.startDate)"></span>
                <template x-if="edu.startDate || edu.endDate">
                  <span> – </span>
                </template>
                <span x-text="edu.endDate ? formatDate(edu.endDate) : 'Present'"></span>
              </span>
            </div>
            <p
              class="card-subtitle"
              x-text="[edu.studyType, edu.area].filter(Boolean).join(' · ')"
            ></p>
            <p
              class="card-body"
              x-show="edu.score"
              x-text="'Score: ' + edu.score"
            ></p>
          </article>
        </template>
      </div>
    </section>

    <!-- ── View 3: Skills ───────────────────────────────── -->
    <section
      class="view"
      :class="{
        'is-active':  currentView  === 'skills',
        'is-exiting': exitingView  === 'skills'
      }"
      aria-label="Skills"
    >
      <div class="view-inner">
        <h2 class="section-label" :data-index="views.find(v => v.id === 'skills')?.sectionIndex">Skills</h2>

        <div class="skills-grid">
          <template
            x-for="(group, i) in (resume?.skills ?? [])"
            :key="i"
          >
            <div class="skill-group" :aria-label="group.name">
              <h3 class="skill-group-label" x-text="group.name"></h3>
              <div class="tags" role="list">
                <template x-for="kw in group.keywords" :key="kw">
                  <span class="tag" role="listitem" x-text="kw"></span>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

    <!-- ── View 4: Experience ───────────────────────────── -->
    <section
      class="view"
      :class="{
        'is-active':  currentView  === 'experience',
        'is-exiting': exitingView  === 'experience'
      }"
      aria-label="Work Experience"
    >
      <div class="view-inner">
        <h2 class="section-label" :data-index="views.find(v => v.id === 'experience')?.sectionIndex">Experience</h2>

        <div x-show="!(resume?.work?.length)" class="empty-state">
          Work history coming soon.
        </div>

        <template
          x-for="(job, i) in (resume?.work ?? [])"
          :key="i"
        >
          <article class="card">
            <div class="card-row">
              <h3 class="card-title">
                <template x-if="job.url">
                  <a
                    class="card-link"
                    :href="job.url"
                    target="_blank"
                    rel="noopener noreferrer"
                    x-text="job.name"
                  ></a>
                </template>
                <template x-if="!job.url">
                  <span x-text="job.name"></span>
                </template>
              </h3>
              <span class="card-meta" x-show="job.startDate">
                <span x-text="formatDate(job.startDate)"></span>
                <span> – </span>
                <span x-text="job.endDate ? formatDate(job.endDate) : 'Present'"></span>
              </span>
            </div>
            <p class="card-subtitle" x-text="job.position"></p>
            <p
              class="card-body"
              x-show="job.summary"
              x-text="job.summary"
            ></p>
            <ul
              class="highlights"
              x-show="job.highlights && job.highlights.length"
              aria-label="Highlights"
            >
              <template x-for="h in (job.highlights ?? [])" :key="h">
                <li x-text="h"></li>
              </template>
            </ul>
          </article>
        </template>
      </div>
    </section>

    <!-- ── View 5: Contact ──────────────────────────────── -->
    <section
      class="view"
      :class="{
        'is-active':  currentView  === 'contact',
        'is-exiting': exitingView  === 'contact'
      }"
      aria-label="Contact"
    >
      <div class="view-landing">

        <div class="landing-header">
          <span class="mono-label">05 — Contact</span>
        </div>

        <span class="landing-sep" aria-hidden="true"></span>

        <div class="landing-name-block">
          <h2 class="contact-heading">Get in<br/>touch.</h2>
        </div>

        <footer class="landing-footer">
          <hr class="landing-rule" aria-hidden="true" />
          <div class="contact-links">
            <!-- Email -->
            <a
              class="contact-link"
              :href="'mailto:' + (resume?.basics?.email ?? '')"
              x-show="resume?.basics?.email"
              @mouseenter="showLinkPopup($event, 'mailto:' + (resume?.basics?.email ?? ''))"
              @mouseleave="hideLinkPopup()"
              @contextmenu.prevent="showLinkPopup($event, 'mailto:' + (resume?.basics?.email ?? ''))"
            >
              <span class="icon-box"><i class="gg-mail" aria-hidden="true"></i></span>
              <span x-text="resume?.basics?.email"></span>
            </a>

            <!-- Social profiles -->
            <template
              x-for="profile in (resume?.basics?.profiles ?? [])"
              :key="profile.network"
            >
              <a
                class="contact-link"
                :href="profile.url"
                target="_blank"
                rel="noopener noreferrer"
                @mouseenter="showLinkPopup($event, profile.url)"
                @mouseleave="hideLinkPopup()"
                @contextmenu.prevent="showLinkPopup($event, profile.url)"
              >
                <span class="icon-box"><i :class="'gg-' + profileIcon(profile.network)" aria-hidden="true"></i></span>
                <span x-text="profile.network + ' / ' + profile.username"></span>
              </a>
            </template>

            <!-- Resume / CV -->
            <a
              class="contact-link"
              href="https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view"
              target="_blank"
              rel="noopener noreferrer"
              @mouseenter="showLinkPopup($event, 'https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view')"
              @mouseleave="hideLinkPopup()"
              @contextmenu.prevent="showLinkPopup($event, 'https://drive.google.com/file/d/1JVNd-xHBrdpktsuDREXfbxVwLKMbNYjy/view')"
            >
              <span class="icon-box"><i class="gg-file-document" aria-hidden="true"></i></span>
              <span>Resume / CV</span>
            </a>
          </div>
        </footer>

      </div>
    </section>

    <!-- ── View 6: Settings ─────────────────────────────── -->
    <section
      class="view settings-view"
      :class="{
        'is-active':  currentView  === 'settings',
        'is-exiting': exitingView  === 'settings'
      }"
      aria-label="Settings"
    >
      <div class="view-inner">
        <h2 class="section-label" :data-index="views.find(v => v.id === 'settings')?.sectionIndex">Settings</h2>

        <!-- Theme Section -->
        <div class="settings-section">
          <h3 class="settings-section-label">Theme</h3>
          <div class="theme-options">

            <button
              class="theme-option"
              :class="{ 'is-active': currentTheme === 'light' }"
              @click="setTheme('light')"
              type="button"
              aria-label="Light theme"
            >
              <span class="theme-option-icon">
                <i class="gg-sun" aria-hidden="true"></i>
              </span>
              <span class="theme-option-label">Light</span>
            </button>

            <button
              class="theme-option"
              :class="{ 'is-active': currentTheme === 'dark' }"
              @click="setTheme('dark')"
              type="button"
              aria-label="Dark theme"
            >
              <span class="theme-option-icon">
                <i class="gg-moon" aria-hidden="true"></i>
              </span>
              <span class="theme-option-label">Dark</span>
            </button>

            <button
              class="theme-option"
              :class="{ 'is-active': currentTheme === 'system' }"
              @click="setTheme('system')"
              type="button"
              aria-label="System theme"
            >
              <span class="theme-option-icon">
                <i class="gg-laptop" aria-hidden="true"></i>
              </span>
              <span class="theme-option-label">System</span>
            </button>

          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ── Settings Toggle ─────────────────────────────────── -->
  <button
    class="settings-btn"
    :class="{ 'is-open': currentView === 'settings' }"
    @click="toggleSettings()"
    :aria-label="currentView === 'settings' ? 'Close settings' : 'Open settings'"
    :aria-expanded="currentView === 'settings'"
    x-show="!loading"
    type="button"
  >
    <i :class="currentView === 'settings' ? 'gg-close' : 'gg-options'" aria-hidden="true"></i>
  </button>

  <!-- ── Floating Dock Navigation ────────────────────────── -->
  <nav class="dock" aria-label="Site navigation">
    <template x-for="item in navItems" :key="item.id">
      <button
        class="dock-btn"
        :class="{ 'is-active': currentView === item.id }"
        @click="switchView(item.id)"
        :aria-label="item.name"
        :aria-current="currentView === item.id ? 'page' : false"
        type="button"
      >
        <span x-text="item.name"></span>
      </button>
    </template>
  </nav>

  <!-- ── Link Action Popup ──────────────────────────────────── -->
  <div
    class="link-popup"
    :class="{ 'is-visible': linkPopup.show }"
    :style="`left: ${linkPopup.x}px; top: ${linkPopup.y}px`"
    @mouseenter="keepLinkPopup()"
    @mouseleave="hideLinkPopup()"
    @click.outside="hideLinkPopup(true)"
    role="dialog"
    aria-label="Link actions"
  >
    <button
      class="link-popup-btn"
      @click.stop="copyLink()"
      type="button"
    >
      <i class="gg-copy" aria-hidden="true"></i>
      <span x-text="linkPopup.copied ? 'Copied!' : 'Copy'"></span>
    </button>
    <span class="link-popup-sep" aria-hidden="true"></span>
    <a
      class="link-popup-btn"
      :href="linkPopup.href"
      :target="linkPopup.href.startsWith('mailto:') ? '_self' : '_blank'"
      rel="noopener noreferrer"
      @click.stop="hideLinkPopup(true)"
    >
      <i class="gg-arrow-top-right" aria-hidden="true"></i>
      <span>Open</span>
    </a>
  </div>

  <!-- Script loading order: app.js first (defines portfolio()), then Alpine -->
  <script src="app.js" defer></script>
  <script
    defer
    src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"
  ></script>

</body>
</html>
